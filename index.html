<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airplane Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Airplane Controller</h1>
    </header>

    <main>
        <div>
            <div>
                <ul>
                    <li><button>NAV</button></li>
                    <li><button>COM</button></li>
                </ul>
                <div>Screen</div>
                <ol>
                    <li><button>A</button></li>
                    <li><button>B</button></li>
                    <li><button>C</button></li>
                    <li><button>D</button></li>
                    <li><button>E</button></li>
                    <li><button>F</button></li>
                    <li><button>G</button></li>
                    <li><button>H</button></li>
                    <li><button>I</button></li>
                    <li><button>J</button></li>
                    <li><button>K</button></li>
                    <li><button>L</button></li>
                    <li><button>M</button></li>
                    <li><button>N</button></li>
                    <li><button>O</button></li>
                    <li><button>P</button></li>
                    <li><button>Q</button></li>
                    <li><button>R</button></li>
                    <li><button>S</button></li>
                    <li><button>T</button></li>
                    <li><button>U</button></li>
                    <li><button>V</button></li>
                    <li><button>W</button></li>
                    <li><button>X</button></li>
                    <li><button>Y</button></li>
                    <li><button>Z</button></li>
                </ol>
                <ol>
                    <li><button>1</button></li>
                    <li><button>2</button></li>
                    <li><button>3</button></li>
                    <li><button>4</button></li>
                    <li><button>5</button></li>
                    <li><button>6</button></li>
                    <li><button>7</button></li>
                    <li><button>8</button></li>
                    <li><button>9</button></li>
                    <li><button>0</button></li>
                </ol>
            </div>
        <form>
            <fieldset>
                <!-- <div>
                    <input type="checkbox" name="throttle" id="masterThrottle">
                    <label for="masterThrottle"></label>
                </div> -->
                <div>
                    <input type="checkbox" name="throttle" id="throttleLeft">
                    <label for="throttleLeft"></label>
                </div>
                <div>
                    <input type="checkbox" name="throttle" id="throttleRight">
                    <label for="throttleRight"></label>
                </div>
            </fieldset>
            <fieldset>
                <div>
                    <input type="checkbox" name="fuel" id="fuelLeft">
                    <label for="fuelLeft">L</label>
                </div>
                <div>
                    <input type="checkbox" name="fuel" id="fuelRight">
                    <label for="fuelRight">R</label>
                </div>
            </fieldset>
        </form>
        </div>
    </main>
    
</body>
</html>
