<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airplane Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Airplane Controller</h1>
    </header>

    <main>
        <div>
            <div><img src="img/Altitude_Indicator_Screen_Airplane.png" alt=""></div>
            <div>Screen2</div>
            <div>Screen3</div>
            <div>Screen4</div>
        </div>
        <div>
            <div>
                <ul>
                    <li>
                        <input type="radio" name="screenBtn" id="Nav" checked>
                        <label for="screenBtn">NAV</label>
                    </li>
                    <li>
                        <input type="radio" name="screenBtn" id="Com">
                        <label for="screenBtn">COM</label>
                    </li>
                    <li>
                        <input type="radio" name="screenBtn" id="Fuel">
                        <label for="screenBtn">Fuel</label>
                    </li>
                </ul>
                <div>
                    <img src="img/Nav_Airplane_Screen.jpg" alt="Navigation Screen" id="NavIMG">
                    <img src="img/Com_Airplane_Screen.ppm" alt="COM Screen" id="ComIMG">
                    <img src="img/Fuel_Airplane_Screen.jpg" alt="Fuel Screen" id="FuelIMG">
                </div>
            </div>
        <form>
            <fieldset>
                <!-- <div>
                    <input type="checkbox" name="throttle" id="masterThrottle">
                    <label for="masterThrottle"></label>
                </div> -->
                <div>
                    <input type="checkbox" name="throttle" id="throttleLeft">
                    <label for="throttleLeft"></label>
                </div>
                <div>
                    <input type="checkbox" name="throttle" id="throttleRight">
                    <label for="throttleRight"></label>
                </div>
            </fieldset>
            <fieldset>
                <div>
                    <input type="checkbox" name="fuel" id="fuelLeft">
                    <label for="fuelLeft">L</label>
                </div>
                <div>
                    <input type="checkbox" name="fuel" id="fuelRight">
                    <label for="fuelRight">R</label>
                </div>
            </fieldset>
        </form>
        </div>
    </main>
    
</body>
</html>
